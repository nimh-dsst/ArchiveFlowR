[workspace]
name = "ArchiveFlowR"
version = "0.1.0"
description = "LabArchives SSO auth helpers"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
# Run all tests
test = "Rscript -e \"testthat::test_local(stop_on_failure=TRUE)\""

# Lint package with lintr
lint = "Rscript scripts/lint.R"

# Auto-format package with styler
style = "Rscript scripts/style.R"

# Verify formatting without modifying files
style-check = "Rscript scripts/style_check.R"

# Pre-commit checks for staged R files
pre-commit = "Rscript scripts/pre_commit.R"

# Install repo-managed git hooks
install-git-hooks = "Rscript scripts/install_git_hooks.R"

# Run full package checks (CI-friendly)
r-cmd-check = "Rscript scripts/r_cmd_check.R"

[dependencies]
# R base
r-base = ">=4.1.0"

# HTTP and API
r-httr2 = ">=1.0.0"
r-xml2 = ">=1.3.0"
r-openssl = ">=2.0.0"
r-digest = ">=0.6.0"

# Testing and tooling
r-testthat = ">=3.0.0"
r-pkgload = "*"
r-roxygen2 = "*"
r-lintr = ">=3.3.0_1,<4"
r-shiny = "*"
r-styler = ">=1.11.0,<2"
r-lifecycle = ">=1.0.0"
