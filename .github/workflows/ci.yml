name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  r-cmd-check:
    name: R CMD check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          cache: true

      - name: Install dependencies
        run: pixi install

      - name: Lint
        run: pixi run lint

      - name: Style check
        run: pixi run style-check

      - name: R CMD check
        run: pixi run r-cmd-check
